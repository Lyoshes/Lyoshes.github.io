<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Elemental Blocks MVP</title>
  <style>
    html, body { margin:0; padding:0; height:100%; background:#0b0f14; overflow:hidden; touch-action:none; }
    canvas { display:block; width:100%; height:100%; touch-action:none; }
    .hud  {
      position:fixed;
      left:10px;
      top:54px;
      color:#cfe0f3;
      font:12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      opacity:.9;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .hud-right {
      position:fixed;
      right:10px;
      top:10px;
      color:#cfe0f3;
      font:12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      opacity:.95;
      text-align:right;
    }
    #scoreHud { font-size:16px; font-weight:600; }
    #timeHud { font-size:12px; color:#b6c9e6; }
    .hud-right canvas {
      margin-top:6px;
      background:rgba(10,15,22,0.55);
      border:1px solid rgba(160,190,220,0.2);
      border-radius:6px;
    }
    .overlay {
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(7,10,14,0.78);
      color:#e6f0ff;
      font:16px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      text-align:center;
    }
    .overlay.hidden { display:none; }
    .panel {
      background:rgba(10,15,22,0.85);
      border:1px solid rgba(160,190,220,0.2);
      border-radius:12px;
      padding:18px 22px;
      min-width:240px;
      box-shadow:0 10px 24px rgba(0,0,0,0.35);
    }
    .panel h2 {
      margin:0 0 8px 0;
      font-size:20px;
      font-weight:600;
    }
    .panel p { margin:6px 0; color:#b6c9e6; }
    .panel button {
      margin-top:10px;
      padding:8px 14px;
      border-radius:8px;
      border:0;
      background:#3b6dd8;
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }
    .panel button:active { transform:translateY(1px); }
    .help-btn {
      position:fixed;
      left:10px;
      top:10px;
      width:36px;
      height:36px;
      border-radius:6px;
      border:1px solid rgba(160,190,220,0.35);
      background:rgba(14,20,28,0.85);
      color:#cfe0f3;
      font:18px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      cursor:pointer;
      z-index:4;
    }
    .help-btn:active { transform:translateY(1px); }
    .help-panel p { margin:6px 0; color:#b6c9e6; text-align:left; }
    .controls-right {
      position:fixed;
      right:12px;
      bottom:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      z-index:3;
    }
    .control-btn {
      width:54px;
      height:54px;
      border-radius:14px;
      border:1px solid rgba(160,190,220,0.35);
      background:rgba(14,20,28,0.85);
      color:#cfe0f3;
      font:20px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
    }
    .control-btn:active { transform:translateY(1px); }
    .color-row {
      position:fixed;
      left:10px;
      bottom:12px;
      display:flex;
      gap:8px;
      z-index:3;
    }
    .color-btn {
      width:46px;
      height:46px;
      border-radius:999px;
      border:2px solid rgba(160,190,220,0.35);
      background:rgba(14,20,28,0.85);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      position:relative;
      font:bold 14px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:#fff;
      text-shadow:0 1px 2px rgba(0,0,0,0.5);
    }
    .color-btn.active {
      border-color:#fff;
      box-shadow:0 0 8px rgba(255,255,255,0.5);
    }
    .color-btn.empty {
      opacity:0.4;
      cursor:default;
    }
    .color-btn .charges {
      position:absolute;
      z-index:1;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud"></div>
<div class="hud-right">
  <div id="scoreHud">Score: 0</div>
  <div id="timeHud">Time: 0:00</div>
  <div id="nextLabel">Next</div>
  <canvas id="nextCanvas" width="90" height="90"></canvas>
</div>
<div class="overlay" id="overlay">
  <div class="panel">
    <h2 id="overlayTitle">Elemental Blocks</h2>
    <p id="overlayStats"></p>
    <button id="startBtn">Start</button>
  </div>
</div>
<button class="help-btn" id="helpBtn" aria-label="Help">i</button>
<div class="overlay hidden" id="helpOverlay">
  <div class="panel help-panel">
    <h2>Controls</h2>
    <p>Swipe left/right: rotate the cylinder in steps.</p>
    <p>Swipe down: faster drop.</p>
    <p>Double tap / click: rotate the piece.</p>
    <p><b>Magic:</b> Tap a color button to select element, then tap a block to destroy it. Each element has 3 charges per game.</p>
    <button id="helpClose">Close</button>
  </div>
</div>
<div class="controls-right">
  <button class="control-btn" id="rotateBtn" aria-label="Rotate">⟳</button>
</div>
<div class="color-row" aria-label="Magic">
  <button class="color-btn" id="magicRed" data-element="fire" style="background:radial-gradient(circle, #ff4d4d 40%, rgba(14,20,28,0.85) 70%);"><span class="charges">3</span></button>
  <button class="color-btn" id="magicBlue" data-element="water" style="background:radial-gradient(circle, #4da6ff 40%, rgba(14,20,28,0.85) 70%);"><span class="charges">3</span></button>
  <button class="color-btn" id="magicYellow" data-element="lightning" style="background:radial-gradient(circle, #ffd84d 40%, rgba(14,20,28,0.85) 70%);"><span class="charges">3</span></button>
  <button class="color-btn" id="magicGreen" data-element="earth" style="background:radial-gradient(circle, #47d16a 40%, rgba(14,20,28,0.85) 70%);"><span class="charges">3</span></button>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  canvas.style.touchAction = 'none';

  const TAU = Math.PI * 2;
  const BLOCK_COLOR_FRONT = 'rgb(235,240,250)';
  const BLOCK_COLOR_BACK = 'rgb(55,62,75)';
  const ACTIVE_COLOR_FRONT = 'rgba(255,170,180,0.75)';
  const GHOST_COLOR_FRONT = 'rgba(110,255,150,0.28)';

  // ===== Game params =====
  const N = 30;   // sectors around ring
  const H = 24;   // height in rows (0 bottom)
  const ANG_OFFSET = Math.PI / 2;

  // ===== Layout tuning =====
  const TOP_PAD_PX = 18;
  const BOTTOM_PAD_PX = 90;
  const MAX_RADIUS_X = 260;
  const RADIUS_X_FACTOR = 0.36;

  // ===== Tetris-like lock delay (CONFIG) =====
  const LOCK_DELAY_SEC = 0.58;
  const LOCK_RESET_ON_MOVE = true;
  const LOCK_RESET_LIMIT = 12;

  // ===== Killzone (CONFIG) =====
  const KILL_RATE = 0.09;         // units per second (how fast KZ rises)
  const KILL_RING_BONUS = 3.0;    // how much KZ drops when ring is cleared

  // ===== Piece fall speed (CONFIG) =====
  const FALL_INTERVAL = 1;     // seconds per row (lower = faster)

  // ===== Match-3 system (CONFIG) =====
  const MATCH_3_CHARGES = 1;      // charges gained for 3-in-a-row
  const MATCH_4_CHARGES = 2;      // charges gained for 4-in-a-row
  const MATCH_5_CHARGES = 3;      // charges gained for 5-in-a-row
  const MATCH_LINE_KZ_BONUS = 1;  // KZ drops per line combo
  const MATCH_PAIR_KZ_BONUS = 2;  // KZ drops per pair combo
  const MATCH_HIGHLIGHT_SEC = 2.0; // seconds to highlight matched blocks before destroying
  const MATCH_SHRINK_PHASE = 0.3;  // last 30% of time is shrink+fade animation
  const MAGIC_SHRINK_SEC = 0.5;    // seconds for magic hit shrink animation (no blink, just shrink)

  // Element colors: 1=fire(red), 2=water(blue), 3=lightning(yellow), 4=earth(green)
  const ELEMENT_COLORS = {
    1: '#ff4d4d',  // fire - red
    2: '#4da6ff',  // water - blue
    3: '#ffd84d',  // lightning - yellow
    4: '#47d16a',  // earth - green
  };
  const ELEMENT_NAMES = { 1: 'fire', 2: 'water', 3: 'lightning', 4: 'earth' };

  // ===== Controls direction params =====
  // Direction switch for cylinder rotation (+1 / -1)
  const ROT_DIR = 1;

  // Rotation direction for the PIECE:
  // +1 = default "rotate right / clockwise" (as you requested)
  // -1 = rotate left / counter-clockwise
  const ROTATE_DIR = -1;

  // ===== Grid =====
  const grid = Array.from({length: H}, () => new Uint8Array(N));

  // ===== Pentomino set (12), NO MIRRORS =====
  const PENTOMINOES = [
    { name:'F', cells:[ {x:1,y:0},{x:2,y:0},{x:0,y:1},{x:1,y:1},{x:1,y:2} ] },
    { name:'I', cells:[ {x:0,y:0},{x:1,y:0},{x:2,y:0},{x:3,y:0},{x:4,y:0} ] },
    { name:'L', cells:[ {x:0,y:0},{x:0,y:1},{x:0,y:2},{x:0,y:3},{x:1,y:0} ] },
    { name:'P', cells:[ {x:0,y:0},{x:1,y:0},{x:0,y:1},{x:1,y:1},{x:0,y:2} ] },
    { name:'N', cells:[ {x:0,y:0},{x:0,y:1},{x:1,y:1},{x:1,y:2},{x:1,y:3} ] },
    { name:'T', cells:[ {x:0,y:0},{x:1,y:0},{x:2,y:0},{x:1,y:1},{x:1,y:2} ] },
    { name:'U', cells:[ {x:0,y:0},{x:2,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1} ] },
    { name:'V', cells:[ {x:0,y:0},{x:0,y:1},{x:0,y:2},{x:1,y:0},{x:2,y:0} ] },
    { name:'W', cells:[ {x:0,y:0},{x:1,y:0},{x:1,y:1},{x:2,y:1},{x:2,y:2} ] },
    { name:'X', cells:[ {x:1,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1},{x:1,y:2} ] },
    { name:'Y', cells:[ {x:0,y:0},{x:0,y:1},{x:0,y:2},{x:0,y:3},{x:1,y:1} ] },
    { name:'Z', cells:[ {x:0,y:0},{x:1,y:0},{x:1,y:1},{x:1,y:2},{x:2,y:2} ] },
  ];

  // ===== Falling piece state =====
  let activePiece = null;
  let pieceY = H + 3;
  let fallTimer = 0;

  // ===== Lock delay runtime state =====
  let lockTimer = 0;
  let isGrounded = false;
  let lockResets = 0;

  // ===== Killzone (visual only) =====
  let killLevel = 0;

  // ===== Rotation (cylinder) =====
  let rotFloat  = 0;
  let targetRot = 0;
  let rotVel    = 0;

  // ===== Input =====
  let dragging = false;
  let startX = 0;
  let startY = 0;
  let startRot = 0;

  let appliedRotStep = 0;
  let lastDropStep = 0;
  let dragInputSign = 1;
  let dragMode = null; // 'rotate' | 'drop'
  let lastMoveX = 0;
  let lastMoveY = 0;
  let lastMoveTime = 0;
  let rotAccumulator = 0;

  const PX_PER_STEP = 34;
  const DEADZONE_PX = 6;
  const PX_PER_DROP = 18;
  const AXIS_DOMINANCE = 1.35;
  const SWIPE_SPEED_REF = 650;
  const MIN_DROP_PX = 6;
  const MAX_DROP_PX = 22;
  const MIN_ROT_PX = 5; // 14;
  const MAX_ROT_PX = 46;  // 46;

  // ===== Double tap / double click =====
  const DOUBLE_TAP_MS = 280;
  const DOUBLE_TAP_MAX_DIST = 18;
  let lastTapTime = 0;
  let lastTapX = 0;
  let lastTapY = 0;
  const APP_VERSION = '0.5.9';

  // ===== Game state / scoring =====
  let gameState = 'intro'; // intro | playing | gameover
  let score = 0;
  let startTime = 0;
  let elapsedMs = 0;
  let nextPiece = null;

  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayStats = document.getElementById('overlayStats');
  const startBtn = document.getElementById('startBtn');
  const hud = document.getElementById('hud');
  const scoreHud = document.getElementById('scoreHud');
  const timeHud = document.getElementById('timeHud');
  const nextCanvas = document.getElementById('nextCanvas');
  const nextCtx = nextCanvas.getContext('2d');
  const helpBtn = document.getElementById('helpBtn');
  const helpOverlay = document.getElementById('helpOverlay');
  const helpClose = document.getElementById('helpClose');
  const rotateBtn = document.getElementById('rotateBtn');
  let pausedFromState = null;

  // ===== Magic system =====
  const magicBtns = {
    fire: document.getElementById('magicRed'),
    water: document.getElementById('magicBlue'),
    lightning: document.getElementById('magicYellow'),
    earth: document.getElementById('magicGreen'),
  };
  const magicCharges = { fire: 3, water: 3, lightning: 3, earth: 3 };
  let activeMagic = null; // currently selected element

  // ===== Match highlight state =====
  let highlightedCells = []; // { y, s, color, isLine, isMagic } - cells currently highlighted
  let highlightStartTime = 0;
  let isHighlighting = false;
  let isMagicAnimation = false; // true = shrink only (no blink), false = blink + shrink
  let pendingKzBonus = 0; // KZ bonus to apply after highlight ends
  let pendingScore = 0;   // Score to apply after highlight ends

  function updateMagicBtns() {
    for (const [element, btn] of Object.entries(magicBtns)) {
      const charges = magicCharges[element];
      btn.querySelector('.charges').textContent = charges;
      btn.classList.toggle('empty', charges <= 0);
      btn.classList.toggle('active', activeMagic === element && charges > 0);
    }
  }

  function selectMagic(element) {
    if (magicCharges[element] <= 0) return;
    activeMagic = (activeMagic === element) ? null : element;
    updateMagicBtns();
  }

  function shootMagic(screenX, screenY) {
    if (!activeMagic || magicCharges[activeMagic] <= 0) return false;
    if (isHighlighting) return false; // Don't shoot during animation
    
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const centerX = w * 0.5;
    const topY = TOP_PAD_PX;
    const bottomY = h - BOTTOM_PAD_PX;
    const towerHeightPx = Math.max(1, bottomY - topY);
    const radiusX = Math.min(w * RADIUS_X_FACTOR, MAX_RADIUS_X);
    const radiusY = radiusX * 0.28;

    // Find which block was hit
    let hitBlock = null;
    let hitDist = Infinity;

    for (let y = 0; y < H; y++) {
      const yScr = levelYToScreenY(topY, towerHeightPx, y + 0.5);
      for (let s = 0; s < N; s++) {
        if (!grid[y][s]) continue;
        const p = sectorCenterXY(centerX, yScr, radiusX, radiusY, s, rotFloat);
        const depth = Math.sin(p.ang);
        // Only hit front-facing blocks
        if (depth < -0.1) continue;
        
        const dx = screenX - p.x;
        const dy = screenY - p.y;
        const dist = Math.hypot(dx, dy);
        const bh = (towerHeightPx / H) * 0.90;
        const bw = bh * 1.2;
        
        if (Math.abs(dx) < bw/2 && Math.abs(dy) < bh/2 && dist < hitDist) {
          hitDist = dist;
          hitBlock = { y, s };
        }
      }
    }

    if (hitBlock) {
      // Start shrink animation for magic hit
      const color = grid[hitBlock.y][hitBlock.s];
      highlightedCells = [{ y: hitBlock.y, s: hitBlock.s, color, isLine: false, isMagic: true }];
      highlightStartTime = performance.now();
      isHighlighting = true;
      isMagicAnimation = true;
      pendingKzBonus = 0;
      pendingScore = 25; // bonus for destroying block
      
      magicCharges[activeMagic]--;
      activeMagic = null;
      updateMagicBtns();
      return true;
    }
    return false;
  }

  // ===== Gravity system =====
  const GRAVITY_DELAY_MS = 100; // delay before blocks fall

  function getNeighbors(y, s) {
    // Returns neighbors connected by edges (not diagonal)
    const neighbors = [];
    // Up
    if (y + 1 < H) neighbors.push({ y: y + 1, s });
    // Down
    if (y - 1 >= 0) neighbors.push({ y: y - 1, s });
    // Left (wrap around cylinder)
    neighbors.push({ y, s: normSector(s - 1) });
    // Right (wrap around cylinder)
    neighbors.push({ y, s: normSector(s + 1) });
    return neighbors;
  }

  function findConnectedComponents() {
    const visited = Array.from({ length: H }, () => new Uint8Array(N));
    const components = [];

    for (let y = 0; y < H; y++) {
      for (let s = 0; s < N; s++) {
        if (!grid[y][s] || visited[y][s]) continue;

        // BFS to find component
        const component = [];
        const queue = [{ y, s }];
        visited[y][s] = 1;

        while (queue.length > 0) {
          const cell = queue.shift();
          component.push(cell);

          for (const neighbor of getNeighbors(cell.y, cell.s)) {
            if (grid[neighbor.y][neighbor.s] && !visited[neighbor.y][neighbor.s]) {
              visited[neighbor.y][neighbor.s] = 1;
              queue.push(neighbor);
            }
          }
        }

        components.push(component);
      }
    }

    return components;
  }

  function isGroundedComponent(component) {
    // Check if any block in component touches row 0
    return component.some(cell => cell.y === 0);
  }

  function dropComponent(component) {
    // Store colors before removing
    const colorData = component.map(cell => ({
      ...cell,
      color: grid[cell.y][cell.s]
    }));

    // Remove component from grid
    for (const cell of component) {
      grid[cell.y][cell.s] = 0;
    }

    // Find how far it can drop
    let dropDistance = H;
    for (const cell of component) {
      let maxDrop = cell.y; // can drop at most to row 0
      for (let dy = 1; dy <= cell.y; dy++) {
        const targetY = cell.y - dy;
        // Check if target cell is occupied by something NOT in this component
        if (grid[targetY][cell.s]) {
          maxDrop = dy - 1;
          break;
        }
      }
      dropDistance = Math.min(dropDistance, maxDrop);
    }

    // Place component at new position with colors preserved
    for (const cell of colorData) {
      grid[cell.y - dropDistance][cell.s] = cell.color;
    }

    return dropDistance > 0;
  }

  function applyGravityOnly() {
    // Just apply gravity without checking matches
    let changed = true;
    while (changed) {
      changed = false;
      const components = findConnectedComponents();
      
      for (const component of components) {
        if (!isGroundedComponent(component)) {
          if (dropComponent(component)) {
            changed = true;
          }
        }
      }
    }
  }

  function applyGravity() {
    // Start the async match processing chain
    continueMatchProcessing();
  }

  function startHighlight(lineMatches, pairMatches) {
    // Collect all cells to highlight
    const cellMap = new Map(); // key -> { y, s, color, isLine }
    let totalKzBonus = 0;
    let totalScore = 0;

    // Process line matches (3, 4, 5+)
    for (const match of lineMatches) {
      const element = ELEMENT_NAMES[match.color];
      let charges = 0;
      if (match.length >= 5) charges = MATCH_5_CHARGES;
      else if (match.length === 4) charges = MATCH_4_CHARGES;
      else if (match.length === 3) charges = MATCH_3_CHARGES;

      if (element && magicCharges[element] !== undefined) {
        magicCharges[element] += charges;
      }
      totalKzBonus += MATCH_LINE_KZ_BONUS;
      totalScore += match.length * 10;

      for (const cell of match.cells) {
        const key = `${cell.y},${cell.s}`;
        if (!cellMap.has(key)) {
          cellMap.set(key, { y: cell.y, s: cell.s, color: match.color, isLine: true });
        }
      }
    }

    // Process pair matches
    for (const match of pairMatches) {
      totalKzBonus += MATCH_PAIR_KZ_BONUS;
      totalScore += 5;

      for (const cell of match.cells) {
        const key = `${cell.y},${cell.s}`;
        if (!cellMap.has(key)) {
          cellMap.set(key, { y: cell.y, s: cell.s, color: grid[cell.y][cell.s], isLine: false });
        }
      }
    }

    // Start highlight phase
    highlightedCells = Array.from(cellMap.values());
    highlightStartTime = performance.now();
    isHighlighting = true;
    isMagicAnimation = false; // combo = blink + shrink
    pendingKzBonus = totalKzBonus;
    pendingScore = totalScore;

    updateMagicBtns();
  }

  function finishHighlight() {
    // Remove highlighted cells from grid
    for (const cell of highlightedCells) {
      grid[cell.y][cell.s] = 0;
    }

    // Apply pending bonuses
    if (pendingKzBonus > 0) {
      killLevel = Math.max(0, killLevel - pendingKzBonus * (KILL_RATE * 10));
    }
    score += pendingScore;
    updateScoreHud();

    // Clear highlight state
    highlightedCells = [];
    isHighlighting = false;
    isMagicAnimation = false;
    pendingKzBonus = 0;
    pendingScore = 0;

    // Continue cascade: gravity -> check matches again
    continueMatchProcessing();
  }

  function continueMatchProcessing() {
    // Apply gravity first
    applyGravityOnly();

    // Check for new matches
    const { lineMatches, pairMatches } = findMatches();
    if (lineMatches.length > 0 || pairMatches.length > 0) {
      // Start new highlight phase
      startHighlight(lineMatches, pairMatches);
    } else {
      // No more matches - check rings and finish
      const cleared = clearRings();
      if (cleared > 0) {
        score += cleared * 500;
        updateScoreHud();
      }
      // Spawn next piece if we don't have one
      if (!activePiece && gameState === 'playing') {
        spawnPiece();
      }
    }
  }

  function processMatchesOnce(lineMatches, pairMatches) {
    // Legacy function - now starts highlight instead of instant removal
    startHighlight(lineMatches, pairMatches);
  }

  function normSector(s) {
    s %= N;
    if (s < 0) s += N;
    return s;
  }

  function snappedRot() {
    return normSector(Math.round(rotFloat));
  }

  function canPlaceAtRot(y, rotInt) {
    if (!activePiece) return false;
    const s0 = normSector(rotInt);

    for (const c of activePiece.cells) {
      const cy = y + c.y;
      const cs = normSector(s0 + c.x);

      if (cy < 0) return false;
      if (cy >= H) continue;
      if (grid[cy][cs]) return false;
    }
    return true;
  }

  function canPlaceAt(y) {
    return canPlaceAtRot(y, snappedRot());
  }

  // ===== Piece rotation (base CW) =====
  function rotateCellsWithColorsCW(cells, colors) {
    // CW: (x,y)->(y,-x), then normalize to minX/minY = 0
    const rotated = cells.map(({x,y}, i) => ({ x: y, y: -x, color: colors[i] }));
    let minX = Infinity, minY = Infinity;
    for (const c of rotated) { minX = Math.min(minX, c.x); minY = Math.min(minY, c.y); }
    for (const c of rotated) { c.x -= minX; c.y -= minY; }
    rotated.sort((a,b) => (a.y - b.y) || (a.x - b.x));
    return {
      cells: rotated.map(c => ({ x: c.x, y: c.y })),
      colors: rotated.map(c => c.color)
    };
  }

  function maybeResetLockDelay() {
    if (!LOCK_RESET_ON_MOVE) return;
    if (LOCK_RESET_LIMIT !== 0 && lockResets >= LOCK_RESET_LIMIT) return;
    lockTimer = 0;
    lockResets += 1;
  }

  function rotatePieceByDir() {
    if (!activePiece) return;

    const oldCells = activePiece.cells;
    const oldColors = activePiece.colors;

    // Apply CW once for +1, or CW three times for -1 (== CCW)
    let result = { cells: oldCells, colors: oldColors };
    if (ROTATE_DIR >= 0) {
      result = rotateCellsWithColorsCW(result.cells, result.colors);
    } else {
      result = rotateCellsWithColorsCW(result.cells, result.colors);
      result = rotateCellsWithColorsCW(result.cells, result.colors);
      result = rotateCellsWithColorsCW(result.cells, result.colors);
    }

    activePiece.cells = result.cells;
    activePiece.colors = result.colors;

    if (!canPlaceAt(Math.floor(pieceY))) {
      activePiece.cells = oldCells;
      activePiece.colors = oldColors;
      return;
    }

    if (isGrounded) maybeResetLockDelay();
  }

  function computeGhostY() {
    if (!activePiece) return null;
    let y = Math.floor(pieceY);
    while (canPlaceAt(y - 1)) y -= 1;
    return y;
  }

  function updateGroundedState() {
    if (!activePiece) return false;
    
    const nextY = Math.floor(pieceY) - 1;
    const groundedNow = !canPlaceAt(nextY);

    if (groundedNow && !isGrounded) {
      isGrounded = true;
      lockTimer = 0;
      lockResets = 0;
    } else if (!groundedNow && isGrounded) {
      isGrounded = false;
      lockTimer = 0;
      lockResets = 0;
    }
    return groundedNow;
  }

  function formatElapsed(ms) {
    const totalSec = Math.max(0, Math.floor(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function updateOverlay() {
    if (gameState === 'playing') {
      overlay.classList.add('hidden');
      return;
    }
    overlay.classList.remove('hidden');
    if (gameState === 'intro') {
      overlayTitle.textContent = 'Elemental Blocks';
      overlayStats.textContent = `Push Start • v${APP_VERSION}`;
      startBtn.textContent = 'Start';
    } else {
      overlayTitle.textContent = 'Game Over';
      overlayStats.textContent = `Score: ${score} • Time: ${formatElapsed(elapsedMs)} • v${APP_VERSION}`;
      startBtn.textContent = 'Play again';
    }
  }

  function updateScoreHud() {
    scoreHud.textContent = `Score: ${score}`;
  }

  function updateTimeHud() {
    timeHud.textContent = `Time: ${formatElapsed(elapsedMs)}`;
  }

  function drawNextPreview() {
    nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    if (!nextPiece) return;

    const cells = nextPiece.cells;
    const colors = nextPiece.colors;
    let maxX = 0;
    let maxY = 0;
    for (const c of cells) {
      if (c.x > maxX) maxX = c.x;
      if (c.y > maxY) maxY = c.y;
    }

    const gridW = maxX + 1;
    const gridH = maxY + 1;
    const pad = 6;
    const cellSize = Math.floor(
      Math.min(
        (nextCanvas.width - pad * 2) / gridW,
        (nextCanvas.height - pad * 2) / gridH
      )
    );
    const offsetX = Math.floor((nextCanvas.width - gridW * cellSize) / 2);
    const offsetY = Math.floor((nextCanvas.height - gridH * cellSize) / 2);

    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      const color = colors[i];
      const x = offsetX + c.x * cellSize;
      const y = offsetY + c.y * cellSize;
      
      // Draw block
      nextCtx.fillStyle = 'rgba(255,170,180,0.85)';
      nextCtx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
      
      // Draw element color dot
      const elemColor = ELEMENT_COLORS[color];
      if (elemColor) {
        const dotRadius = (cellSize - 2) * 0.32;
        const cx = x + cellSize / 2;
        const cy = y + cellSize / 2;
        nextCtx.fillStyle = elemColor;
        nextCtx.beginPath();
        nextCtx.arc(cx, cy, dotRadius, 0, TAU);
        nextCtx.fill();
      }
    }
  }

  function startGame() {
    for (let y=0; y<H; y++) grid[y].fill(0);
    killLevel = 0;
    rotFloat = targetRot = 0;
    rotVel = 0;
    score = 0;
    startTime = performance.now();
    elapsedMs = 0;
    gameState = 'playing';
    nextPiece = null;
    // Reset magic
    magicCharges.fire = 3;
    magicCharges.water = 3;
    magicCharges.lightning = 3;
    magicCharges.earth = 3;
    activeMagic = null;
    // Reset highlight state
    highlightedCells = [];
    isHighlighting = false;
    isMagicAnimation = false;
    pendingKzBonus = 0;
    pendingScore = 0;
    updateMagicBtns();
    updateScoreHud();
    updateTimeHud();
    spawnPiece();
    drawNextPreview();
    updateOverlay();
  }

  function endGame() {
    gameState = 'gameover';
    activePiece = null;
    isGrounded = false;
    lockTimer = 0;
    lockResets = 0;
    updateTimeHud();
    updateOverlay();
  }

  function generatePieceColors(cells) {
    // Generate random colors for each cell, avoiding built-in 3+ combos
    const maxAttempts = 50;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const colors = cells.map(() => 1 + ((Math.random() * 4) | 0)); // 1-4
      if (!hasBuiltInCombo(cells, colors)) {
        return colors;
      }
    }
    // Fallback: alternate colors to avoid combos
    return cells.map((_, i) => 1 + (i % 4));
  }

  function hasBuiltInCombo(cells, colors) {
    // Check if 3+ cells of same color form a line within the piece
    // Build a map of cell positions
    const cellMap = new Map();
    cells.forEach((c, i) => cellMap.set(`${c.x},${c.y}`, colors[i]));

    for (let i = 0; i < cells.length; i++) {
      const c = cells[i];
      const color = colors[i];
      
      // Check horizontal line (3 in a row)
      let hCount = 1;
      for (let dx = 1; dx <= 2; dx++) {
        if (cellMap.get(`${c.x + dx},${c.y}`) === color) hCount++;
        else break;
      }
      if (hCount >= 3) return true;

      // Check vertical line (3 in a row)
      let vCount = 1;
      for (let dy = 1; dy <= 2; dy++) {
        if (cellMap.get(`${c.x},${c.y + dy}`) === color) vCount++;
        else break;
      }
      if (vCount >= 3) return true;
    }
    return false;
  }

  function createPieceWithColors(proto) {
    const cells = proto.cells.map(c => ({ x: c.x, y: c.y }));
    const colors = generatePieceColors(cells);
    return { name: proto.name, cells, colors };
  }

  function spawnPiece() {
    if (!nextPiece) {
      const proto = PENTOMINOES[(Math.random() * PENTOMINOES.length) | 0];
      nextPiece = createPieceWithColors(proto);
    }
    activePiece = nextPiece;
    const proto = PENTOMINOES[(Math.random() * PENTOMINOES.length) | 0];
    nextPiece = createPieceWithColors(proto);
    drawNextPreview();

    pieceY = H + 3;
    fallTimer = 0;

    isGrounded = false;
    lockTimer = 0;
    lockResets = 0;

    if (!canPlaceAt(Math.floor(pieceY))) {
      endGame();
    }
  }

  function clearRings() {
    let cleared = 0;
    for (let y = 0; y < H; y++) {
      let full = true;
      for (let s = 0; s < N; s++) {
        if (!grid[y][s]) { full = false; break; }
      }
      if (!full) continue;

      for (let yy = y; yy < H - 1; yy++) {
        grid[yy].set(grid[yy + 1]);
      }
      grid[H - 1].fill(0);

      y--;
      cleared += 1;
      killLevel = Math.max(0, killLevel - KILL_RING_BONUS);
    }
    return cleared;
  }

  function lockPiece() {
    if (!activePiece) return;

    const s0 = snappedRot();
    rotFloat = s0;
    targetRot = s0;
    rotVel = 0;

    let overflowedTop = false;
    for (let i = 0; i < activePiece.cells.length; i++) {
      const c = activePiece.cells[i];
      const color = activePiece.colors[i];
      const cy = Math.floor(pieceY) + c.y;
      const cs = normSector(s0 + c.x);
      if (cy >= H) overflowedTop = true;
      if (cy >= 0 && cy < H) grid[cy][cs] = color; // Store color (1-4) instead of 1
    }

    if (overflowedTop) {
      endGame();
      return;
    }

    score += 50;
    updateScoreHud();
    
    // Clear active piece - new one spawns after match processing completes
    activePiece = null;
    
    // Process gravity, match combos, and ring clears (with cascade)
    applyGravity();
  }

  // ===== Match-3 combo system =====
  function findMatches() {
    const lineMatches = []; // { color, length, cells }
    const pairMatches = []; // { cells } - 4 cells: AABB pattern
    const foundHorizontal = new Set(); // track found matches to avoid duplicates

    // Find horizontal matches (along the ring) - lines of 3+
    // Scan with wrap-around: check each position as potential start
    for (let y = 0; y < H; y++) {
      for (let startS = 0; startS < N; startS++) {
        const startColor = grid[y][startS];
        if (!startColor) continue;
        
        // Count consecutive same-color cells
        let runLength = 1;
        for (let i = 1; i < N; i++) {
          const s = (startS + i) % N;
          if (grid[y][s] === startColor) {
            runLength++;
          } else {
            break;
          }
        }
        
        if (runLength >= 3) {
          // Create unique key to avoid duplicates
          const cells = [];
          const minS = Math.min(...Array.from({length: runLength}, (_, i) => (startS + i) % N));
          const key = `${y},${minS},${runLength},${startColor}`;
          
          if (!foundHorizontal.has(key)) {
            foundHorizontal.add(key);
            for (let i = 0; i < runLength; i++) {
              cells.push({ y, s: (startS + i) % N });
            }
            lineMatches.push({ color: startColor, length: runLength, cells });
          }
        }
      }
    }

    // Find vertical matches - lines of 3+ (no wrap-around vertically)
    for (let s = 0; s < N; s++) {
      let runStart = 0;
      let runColor = grid[0][s];
      let runLength = runColor ? 1 : 0;

      for (let y = 1; y <= H; y++) {
        const color = y < H ? grid[y][s] : 0;
        if (color && color === runColor) {
          runLength++;
        } else {
          if (runLength >= 3 && runColor) {
            const cells = [];
            for (let i = 0; i < runLength; i++) {
              cells.push({ y: runStart + i, s });
            }
            lineMatches.push({ color: runColor, length: runLength, cells });
          }
          runStart = y;
          runColor = color;
          runLength = color ? 1 : 0;
        }
      }
    }

    // Find pair combos (AABB pattern) - horizontal (with wrap-around)
    for (let y = 0; y < H; y++) {
      for (let s = 0; s < N; s++) {
        const c0 = grid[y][s];
        const c1 = grid[y][(s + 1) % N];
        const c2 = grid[y][(s + 2) % N];
        const c3 = grid[y][(s + 3) % N];
        // Pattern: AA BB where A != B, both non-zero
        if (c0 && c0 === c1 && c2 && c2 === c3 && c0 !== c2) {
          pairMatches.push({
            cells: [
              { y, s: s },
              { y, s: (s + 1) % N },
              { y, s: (s + 2) % N },
              { y, s: (s + 3) % N }
            ]
          });
        }
      }
    }

    // Find pair combos (AABB pattern) - vertical
    for (let s = 0; s < N; s++) {
      for (let y = 0; y < H - 3; y++) {
        const c0 = grid[y][s];
        const c1 = grid[y + 1][s];
        const c2 = grid[y + 2][s];
        const c3 = grid[y + 3][s];
        // Pattern: AA BB where A != B, both non-zero
        if (c0 && c0 === c1 && c2 && c2 === c3 && c0 !== c2) {
          pairMatches.push({
            cells: [
              { y: y, s },
              { y: y + 1, s },
              { y: y + 2, s },
              { y: y + 3, s }
            ]
          });
        }
      }
    }

    return { lineMatches, pairMatches };
  }


  function tryMoveDown() {
    if (!activePiece) return false;
    
    const nextY = Math.floor(pieceY) - 1;
    if (canPlaceAt(nextY)) {
      pieceY = nextY;
      isGrounded = false;
      lockTimer = 0;
      lockResets = 0;
      return true;
    }
    isGrounded = true;
    return false;
  }

  // =========================
  // Input handlers
  // =========================
  canvas.addEventListener('pointerdown', (e) => {
    if (gameState !== 'playing') return;
    e.preventDefault?.();

    // If magic is active, try to shoot immediately (single tap)
    if (activeMagic && magicCharges[activeMagic] > 0) {
      if (shootMagic(e.clientX, e.clientY)) {
        return; // Shot fired, don't start drag
      }
    }

    // double tap for rotate
    const now = performance.now();
    const dt = now - lastTapTime;
    const dxTap = e.clientX - lastTapX;
    const dyTap = e.clientY - lastTapY;
    const distTap = Math.hypot(dxTap, dyTap);

    if (dt <= DOUBLE_TAP_MS && distTap <= DOUBLE_TAP_MAX_DIST) {
      rotatePieceByDir();
      lastTapTime = 0;
    } else {
      lastTapTime = now;
      lastTapX = e.clientX;
      lastTapY = e.clientY;
    }

    dragging = true;
    dragInputSign = -1;
    startX = e.clientX;
    startY = e.clientY;
    startRot = targetRot;
    appliedRotStep = 0;
    lastDropStep = 0;
    dragMode = null;
    lastMoveX = e.clientX;
    lastMoveY = e.clientY;
    lastMoveTime = performance.now();
    rotAccumulator = 0;
    rotVel = 0;
    canvas.setPointerCapture(e.pointerId);
  }, { passive: false });

  canvas.addEventListener('pointermove', (e) => {
    if (gameState !== 'playing') return;
    if (!dragging) return;
    e.preventDefault?.();

    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    const now = performance.now();

    if (Math.abs(dx) < DEADZONE_PX && Math.abs(dy) < DEADZONE_PX) return;

    if (!dragMode) {
      const adx = Math.abs(dx);
      const ady = Math.abs(dy);
      if (ady >= adx * AXIS_DOMINANCE) {
        dragMode = 'drop';
      } else if (adx >= ady * AXIS_DOMINANCE) {
        dragMode = 'rotate';
      } else {
        return;
      }
    }

    if (dragMode === 'rotate' && Math.abs(dx) >= DEADZONE_PX) {
      const dt = Math.max(1, now - lastMoveTime);
      const dxStep = e.clientX - lastMoveX;
      const v = Math.max(1, (Math.abs(dxStep) / dt) * 1000);
      const scaledPxPerStep = Math.max(
        MIN_ROT_PX,
        Math.min(MAX_ROT_PX, PX_PER_STEP * (SWIPE_SPEED_REF / v))
      );
      rotAccumulator += (-dxStep / scaledPxPerStep) * ROT_DIR * dragInputSign;
      const stepDelta = Math.trunc(rotAccumulator);
      if (stepDelta !== 0) {
        rotAccumulator -= stepDelta;
      }
      const desiredStep = appliedRotStep + stepDelta;

      if (desiredStep !== appliedRotStep) {
        const dir = Math.sign(desiredStep - appliedRotStep);

        while (appliedRotStep !== desiredStep) {
          const nextStep = appliedRotStep + dir;
          const candidateRot = startRot + nextStep;
          const ok = canPlaceAtRot(Math.floor(pieceY), candidateRot);

          if (!ok) break;

          appliedRotStep = nextStep;
          targetRot = candidateRot;
          rotFloat = targetRot;
          rotVel = 0;

          if (isGrounded) maybeResetLockDelay();
        }
      }
    }

    if (dragMode === 'drop' && dy > DEADZONE_PX) {
      const dt = Math.max(1, now - lastMoveTime);
      const dyStep = e.clientY - lastMoveY;
      const v = Math.max(1, (dyStep / dt) * 1000);
      const scaledPxPerDrop = Math.max(
        MIN_DROP_PX,
        Math.min(MAX_DROP_PX, PX_PER_DROP * (SWIPE_SPEED_REF / v))
      );
      const dropStep = Math.trunc(dy / scaledPxPerDrop);
      if (dropStep > lastDropStep) {
        const steps = dropStep - lastDropStep;
        for (let i = 0; i < steps; i++) tryMoveDown();
        lastDropStep = dropStep;
      }
    }
    lastMoveX = e.clientX;
    lastMoveY = e.clientY;
    lastMoveTime = now;
  }, { passive: false });

  canvas.addEventListener('pointerup', (e) => {
    if (gameState !== 'playing') return;
    if (!dragging) return;
    dragging = false;
    canvas.releasePointerCapture(e.pointerId);
  }, { passive: false });

  rotateBtn.addEventListener('click', () => {
    if (gameState !== 'playing') return;
    rotatePieceByDir();
  });

  // Magic buttons
  for (const [element, btn] of Object.entries(magicBtns)) {
    btn.addEventListener('click', () => {
      if (gameState !== 'playing') return;
      selectMagic(element);
    });
  }

  helpBtn.addEventListener('click', () => {
    if (gameState === 'playing') {
      pausedFromState = 'playing';
      gameState = 'paused';
    }
    helpOverlay.classList.remove('hidden');
  });
  helpClose.addEventListener('click', () => {
    helpOverlay.classList.add('hidden');
    if (pausedFromState === 'playing') {
      pausedFromState = null;
      gameState = 'playing';
      last = performance.now();
    }
  });
  helpOverlay.addEventListener('click', (e) => {
    if (e.target === helpOverlay) {
      helpOverlay.classList.add('hidden');
      if (pausedFromState === 'playing') {
        pausedFromState = null;
        gameState = 'playing';
        last = performance.now();
      }
    }
  });

  // =========================
  // Rendering
  // =========================
  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const w = Math.floor(canvas.clientWidth * dpr);
    const h = Math.floor(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      ctx.setTransform(dpr,0,0,dpr,0,0);
    }
  }

  function levelYToScreenY(topY, towerHeightPx, y) {
    const t = 1 - (y / H);
    return topY + t * towerHeightPx;
  }

  function sectorCenterXY(centerX, yScreen, radiusX, radiusY, s, rot) {
    const ang = ((s - rot) / N) * TAU + ANG_OFFSET;
    return {
      x: centerX + Math.cos(ang) * radiusX,
      y: yScreen + Math.sin(ang) * radiusY,
      ang,
    };
  }

  function drawOrientedBlock(px, py, tx, ty, w, h, fillStyle, alpha=1, elementColor=null, dotAlpha=1) {
    ctx.save();
    ctx.translate(px, py);
    const a = Math.atan2(ty, tx);
    ctx.rotate(a);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = fillStyle;
    ctx.fillRect(-w/2, -h/2, w, h);
    
    // Draw element color dot in center
    if (elementColor) {
      const dotRadius = Math.min(w, h) * 0.28;
      ctx.globalAlpha = alpha * dotAlpha;
      ctx.fillStyle = elementColor;
      ctx.beginPath();
      ctx.arc(0, 0, dotRadius, 0, TAU);
      ctx.fill();
    }
    
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function draw() {
    resize();
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    ctx.clearRect(0,0,w,h);

    ctx.fillStyle = '#0b0f14';
    ctx.fillRect(0,0,w,h);

    const centerX = w * 0.5;
    const topY = TOP_PAD_PX;
    const bottomY = h - BOTTOM_PAD_PX;
    const centerY = (topY + bottomY) * 0.5;
    const towerHeightPx = Math.max(1, bottomY - topY);

    const radiusX = Math.min(w * RADIUS_X_FACTOR, MAX_RADIUS_X);
    const radiusY = radiusX * 0.28;

    const killY = levelYToScreenY(topY, towerHeightPx, killLevel);
    ctx.fillStyle = 'rgba(28,72,120,0.42)';
    ctx.fillRect(0, killY, w, h - killY);

    ctx.strokeStyle = 'rgba(160,190,220,0.25)';
    ctx.lineWidth = 1;
    for (let y=0; y<=H; y++) {
      const py = levelYToScreenY(topY, towerHeightPx, y);
      ctx.beginPath();
      ctx.ellipse(centerX, py, radiusX, radiusY, 0, 0, TAU);
      ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(255,220,140,0.55)';
    ctx.beginPath();
    ctx.moveTo(centerX, topY);
    ctx.lineTo(centerX, bottomY);
    ctx.stroke();

    const backBlocks = [];
    const frontBlocks = [];
    for (let y=0; y<H; y++) {
      const yScr = levelYToScreenY(topY, towerHeightPx, y + 0.5);
      for (let s=0; s<N; s++) {
        const color = grid[y][s];
        if (!color) continue;
        const p = sectorCenterXY(centerX, yScr, radiusX, radiusY, s, rotFloat);
        const depth = Math.sin(p.ang);
        const block = {y, s, yScr, p, depth, color};
        if (depth < -0.1) {
          backBlocks.push(block);
        } else {
          frontBlocks.push(block);
        }
      }
    }
    
    // Compute shrink animation params for highlighted blocks
    let highlightSet = null;
    let blockScale = 1;
    let blockAlpha = 1;
    let inShrinkPhaseGlobal = false;
    if (isHighlighting && highlightedCells.length > 0) {
      highlightSet = new Set(highlightedCells.map(c => `${c.y},${c.s}`));
      const elapsed = (performance.now() - highlightStartTime) / 1000;
      
      if (isMagicAnimation) {
        // Magic: shrink over MAGIC_SHRINK_SEC (no blink phase)
        const progress = Math.min(1, elapsed / MAGIC_SHRINK_SEC);
        blockScale = 1 - progress * 0.85;
        blockAlpha = 1 - progress * 0.9;
        inShrinkPhaseGlobal = true;
      } else {
        // Combo: blink phase then shrink phase
        const progress = Math.min(1, elapsed / MATCH_HIGHLIGHT_SEC);
        const shrinkStart = 1 - MATCH_SHRINK_PHASE;
        if (progress > shrinkStart) {
          const shrinkProgress = (progress - shrinkStart) / MATCH_SHRINK_PHASE;
          blockScale = 1 - shrinkProgress * 0.85;
          blockAlpha = 1 - shrinkProgress * 0.9;
          inShrinkPhaseGlobal = true;
        }
      }
    }

    // Draw back blocks first (sorted by depth, furthest first)
    backBlocks.sort((a,b) => a.depth - b.depth);
    for (const b of backBlocks) {
      const p0 = b.p;
      const p1 = sectorCenterXY(centerX, b.yScr, radiusX, radiusY, b.s+1, rotFloat);
      const p_1 = sectorCenterXY(centerX, b.yScr, radiusX, radiusY, b.s-1, rotFloat);
      const tx = (p1.x - p_1.x);
      const ty = (p1.y - p_1.y);
      const arcDist = Math.hypot(p1.x - p0.x, p1.y - p0.y);
      let bw = arcDist * 1.06;
      let bh = (towerHeightPx / H) * 0.90;
      const elemColor = ELEMENT_COLORS[b.color] || null;
      
      // Apply shrink animation to highlighted blocks
      const isHighlighted = highlightSet && highlightSet.has(`${b.y},${b.s}`);
      const alpha = isHighlighted ? blockAlpha : 1;
      const scale = isHighlighted ? blockScale : 1;
      
      // Back blocks: dim the element dot to reduce visual noise
      drawOrientedBlock(p0.x, p0.y, tx, ty, bw * scale, bh * scale, BLOCK_COLOR_BACK, alpha, elemColor, 0.25);
    }

    // Draw highlighted back blocks with dimmed blinking + shrink/fade (or just shrink for magic)
    if (isHighlighting && highlightedCells.length > 0 && !isMagicAnimation) {
      const elapsed = (performance.now() - highlightStartTime) / 1000;
      const progress = Math.min(1, elapsed / MATCH_HIGHLIGHT_SEC);
      const shrinkStart = 1 - MATCH_SHRINK_PHASE;
      
      const inShrinkPhase = progress > shrinkStart;
      const shrinkProgress = inShrinkPhase ? (progress - shrinkStart) / MATCH_SHRINK_PHASE : 0;
      
      const blinkFreq = 4 + (progress / shrinkStart) * 10;
      const blinkPhase = Math.sin(elapsed * blinkFreq * TAU);
      const blinkAlpha = inShrinkPhase ? 1 : (0.3 + blinkPhase * 0.3); // dimmer for back
      
      const scale = inShrinkPhase ? 1 - shrinkProgress * 0.8 : 1;
      const fadeAlpha = inShrinkPhase ? 1 - shrinkProgress : 1;

      for (const cell of highlightedCells) {
        const yScr = levelYToScreenY(topY, towerHeightPx, cell.y + 0.5);
        const p0 = sectorCenterXY(centerX, yScr, radiusX, radiusY, cell.s, rotFloat);
        const depth = Math.sin(p0.ang);
        
        // Only back-facing blocks here
        if (depth >= -0.1) continue;

        const p1 = sectorCenterXY(centerX, yScr, radiusX, radiusY, cell.s + 1, rotFloat);
        const p_1 = sectorCenterXY(centerX, yScr, radiusX, radiusY, cell.s - 1, rotFloat);
        const tx = (p1.x - p_1.x);
        const ty = (p1.y - p_1.y);
        const arcDist = Math.hypot(p1.x - p0.x, p1.y - p0.y);
        const bw = arcDist * 1.06;
        const bh = (towerHeightPx / H) * 0.90;

        const alpha = blinkAlpha * fadeAlpha;
        const highlightColor = cell.isLine ? 
          `rgba(255, 255, 255, ${alpha * 0.5})` : 
          `rgba(255, 220, 100, ${alpha * 0.4})`;
        
        const sizeMultiplier = inShrinkPhase ? scale : 1.1;
        drawOrientedBlock(p0.x, p0.y, tx, ty, bw * sizeMultiplier, bh * sizeMultiplier, highlightColor, 1, null);
      }
    }
    
    // Draw front blocks on top (sorted by depth, furthest first)
    frontBlocks.sort((a,b) => a.depth - b.depth);
    for (const b of frontBlocks) {
      const p0 = b.p;
      const p1 = sectorCenterXY(centerX, b.yScr, radiusX, radiusY, b.s+1, rotFloat);
      const p_1 = sectorCenterXY(centerX, b.yScr, radiusX, radiusY, b.s-1, rotFloat);
      const tx = (p1.x - p_1.x);
      const ty = (p1.y - p_1.y);
      const arcDist = Math.hypot(p1.x - p0.x, p1.y - p0.y);
      let bw = arcDist * 1.06;
      let bh = (towerHeightPx / H) * 0.90;
      const elemColor = ELEMENT_COLORS[b.color] || null;
      
      // Apply shrink animation to highlighted blocks
      const isHighlighted = highlightSet && highlightSet.has(`${b.y},${b.s}`);
      const alpha = isHighlighted ? blockAlpha : 1;
      const scale = isHighlighted ? blockScale : 1;
      
      drawOrientedBlock(p0.x, p0.y, tx, ty, bw * scale, bh * scale, BLOCK_COLOR_FRONT, alpha, elemColor);
    }

    // Draw highlighted (matched) blocks with blinking + shrink/fade effect (skip for magic - it just shrinks)
    if (isHighlighting && highlightedCells.length > 0 && !isMagicAnimation) {
      const elapsed = (performance.now() - highlightStartTime) / 1000;
      const progress = Math.min(1, elapsed / MATCH_HIGHLIGHT_SEC);
      const shrinkStart = 1 - MATCH_SHRINK_PHASE;
      
      // Phase 1: Blinking (0% to 70%)
      // Phase 2: Shrink + Fade (70% to 100%)
      const inShrinkPhase = progress > shrinkStart;
      const shrinkProgress = inShrinkPhase ? (progress - shrinkStart) / MATCH_SHRINK_PHASE : 0;
      
      // Blink frequency: faster as time runs out (during blink phase)
      const blinkFreq = 4 + (progress / shrinkStart) * 10; // 4Hz to 14Hz
      const blinkPhase = Math.sin(elapsed * blinkFreq * TAU);
      const blinkAlpha = inShrinkPhase ? 1 : (0.5 + blinkPhase * 0.5);
      
      // Shrink and fade during final phase
      const scale = inShrinkPhase ? 1 - shrinkProgress * 0.8 : 1; // shrink to 20%
      const fadeAlpha = inShrinkPhase ? 1 - shrinkProgress : 1;

      for (const cell of highlightedCells) {
        const yScr = levelYToScreenY(topY, towerHeightPx, cell.y + 0.5);
        const p0 = sectorCenterXY(centerX, yScr, radiusX, radiusY, cell.s, rotFloat);
        const depth = Math.sin(p0.ang);
        
        // Skip back-facing blocks for highlight overlay
        if (depth < -0.1) continue;

        const p1 = sectorCenterXY(centerX, yScr, radiusX, radiusY, cell.s + 1, rotFloat);
        const p_1 = sectorCenterXY(centerX, yScr, radiusX, radiusY, cell.s - 1, rotFloat);
        const tx = (p1.x - p_1.x);
        const ty = (p1.y - p_1.y);
        const arcDist = Math.hypot(p1.x - p0.x, p1.y - p0.y);
        const bw = arcDist * 1.06;
        const bh = (towerHeightPx / H) * 0.90;

        // Draw highlight overlay - white flash for lines, yellow for pairs
        const alpha = blinkAlpha * fadeAlpha;
        const highlightColor = cell.isLine ? 
          `rgba(255, 255, 255, ${alpha * 0.7})` : 
          `rgba(255, 220, 100, ${alpha * 0.6})`;
        
        const sizeMultiplier = inShrinkPhase ? scale : 1.15;
        drawOrientedBlock(p0.x, p0.y, tx, ty, bw * sizeMultiplier, bh * sizeMultiplier, highlightColor, 1, null);
      }
    }

    if (activePiece) {
      const ghostY = computeGhostY();
      if (ghostY !== null) {
        const s0 = snappedRot();
        const rotSnap = s0;

        const ghostCells = [];
        for (let i = 0; i < activePiece.cells.length; i++) {
          const c = activePiece.cells[i];
          const color = activePiece.colors[i];
          const cy = ghostY + c.y;
          const cs = normSector(s0 + c.x);
          if (cy < 0 || cy >= H) continue;

          const yScr = levelYToScreenY(topY, towerHeightPx, cy + 0.5);
          const p0 = sectorCenterXY(centerX, yScr, radiusX, radiusY, cs, rotSnap);
          ghostCells.push({cy, cs, yScr, p0, color});
        }

        ghostCells.sort((a,b) => (a.p0.y - b.p0.y));

        for (const g of ghostCells) {
          const p0 = g.p0;
          const p1 = sectorCenterXY(centerX, g.yScr, radiusX, radiusY, g.cs + 1, rotSnap);
          const p_1 = sectorCenterXY(centerX, g.yScr, radiusX, radiusY, g.cs - 1, rotSnap);
          const tx = (p1.x - p_1.x);
          const ty = (p1.y - p_1.y);
          const arcDist = Math.hypot(p1.x - p0.x, p1.y - p0.y);

          const bw = arcDist * 1.06;
          const bh = (towerHeightPx / H) * 0.90;
          const elemColor = ELEMENT_COLORS[g.color] || null;

          drawOrientedBlock(p0.x, p0.y, tx, ty, bw, bh, GHOST_COLOR_FRONT, 1, elemColor);
        }
      }
    }

    if (activePiece) {
      const s0 = snappedRot();
      const rotSnap = s0;

      const yScrRef = levelYToScreenY(topY, towerHeightPx, pieceY + 0.5);
      const p0ref = sectorCenterXY(centerX, yScrRef, radiusX, radiusY, s0, rotSnap);
      const p1ref = sectorCenterXY(centerX, yScrRef, radiusX, radiusY, s0 + 1, rotSnap);
      const arcDist = Math.hypot(p1ref.x - p0ref.x, p1ref.y - p0ref.y);

      const bw = arcDist * 1.06;
      const bh = (towerHeightPx / H) * 0.90;

      for (let i = 0; i < activePiece.cells.length; i++) {
        const c = activePiece.cells[i];
        const color = activePiece.colors[i];
        const cs = normSector(s0 + c.x);
        const cy = pieceY + c.y;

        const yScr = levelYToScreenY(topY, towerHeightPx, cy + 0.5);
        const pc = sectorCenterXY(centerX, yScr, radiusX, radiusY, cs, rotSnap);
        
        // Draw block
        ctx.fillStyle = ACTIVE_COLOR_FRONT;
        ctx.fillRect(pc.x - bw/2, pc.y - bh/2, bw, bh);
        
        // Draw element color dot
        const elemColor = ELEMENT_COLORS[color];
        if (elemColor) {
          const dotRadius = Math.min(bw, bh) * 0.28;
          ctx.fillStyle = elemColor;
          ctx.beginPath();
          ctx.arc(pc.x, pc.y, dotRadius, 0, TAU);
          ctx.fill();
        }
      }
    }

    hud.innerHTML =
      `<div>rot=${rotFloat.toFixed(2)} snap=${snappedRot()}</div>` +
      `<div>grounded=${isGrounded?1:0} lock=${lockTimer.toFixed(2)}/${LOCK_DELAY_SEC}</div>` +
      `<div>resets=${lockResets}/${LOCK_RESET_LIMIT||'∞'}</div>`;
  }

  // =========================
  // Main loop
  // =========================
  let last = performance.now();
  function tick(now) {
    const dt = Math.min(0.05, Math.max(0.001, (now - last) / 1000));
    last = now;

    if (gameState === 'playing') {
      elapsedMs = now - startTime;
      updateTimeHud();
      killLevel += KILL_RATE * dt;
      if (killLevel >= H) endGame();

      // Check highlight timer
      if (isHighlighting) {
        const highlightElapsed = (now - highlightStartTime) / 1000;
        const duration = isMagicAnimation ? MAGIC_SHRINK_SEC : MATCH_HIGHLIGHT_SEC;
        if (highlightElapsed >= duration) {
          finishHighlight();
        }
      }
    }

    rotFloat = targetRot;
    if (rotFloat >  1e6) rotFloat %= N;
    if (rotFloat < -1e6) rotFloat %= N;

    if (gameState === 'playing') {
      fallTimer += dt;
      if (fallTimer >= FALL_INTERVAL) {
        fallTimer -= FALL_INTERVAL;
        tryMoveDown();
      }
    }

    if (gameState === 'playing') {
      const groundedNow = updateGroundedState();
      if (groundedNow) {
        lockTimer += dt;
        if (lockTimer >= LOCK_DELAY_SEC) lockPiece();
      }
    }

    draw();
    requestAnimationFrame(tick);
  }

  startBtn.addEventListener('click', () => {
    if (gameState !== 'playing') startGame();
  });

  updateMagicBtns();
  updateOverlay();
  requestAnimationFrame(tick);
})();
</script>
